name: StickerBoard
options:
  bundleIdPrefix: com.tebasaki
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_CFBundleDisplayName: "シールボード -デジタルシール帳-"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"

targets:
  StickerBoard:
    type: application
    platform: iOS
    sources:
      - StickerBoard
      - path: Products.storekit
        optional: true
        buildPhase: none
    settings:
      base:
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "シールにする写真を選択するためにフォトライブラリへのアクセスが必要です"
        INFOPLIST_KEY_NSCameraUsageDescription: "シールにする写真を撮影するためにカメラへのアクセスが必要です"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "ボードを画像として写真に保存するためにフォトライブラリへのアクセスが必要です"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.1.0"
        PRODUCT_BUNDLE_IDENTIFIER: "com.tebasaki.StickerBoard"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGN_ENTITLEMENTS: StickerBoard/StickerBoard.entitlements
    dependencies:
      - target: StickerBoardWidgetExtension
        embed: true

  StickerBoardWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - StickerBoardWidget
    info:
      path: StickerBoardWidget/Info.plist
      properties:
        CFBundleDisplayName: "シールボード ウィジェット"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.1.0"
        PRODUCT_BUNDLE_IDENTIFIER: "com.tebasaki.StickerBoard.Widget"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 6CGGS6SX69
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: StickerBoardWidget/StickerBoardWidget.entitlements
        TARGETED_DEVICE_FAMILY: "1"

  StickerBoardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - StickerBoardTests
    dependencies:
      - target: StickerBoard
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: "com.tebasaki.StickerBoardTests"

schemes:
  StickerBoard:
    build:
      targets:
        StickerBoard: all
        StickerBoardWidgetExtension: all
    run:
      config: Debug
      storeKitConfiguration: Products.storekit
    test:
      config: Debug
      targets:
        - StickerBoardTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
