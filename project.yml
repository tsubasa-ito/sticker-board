name: StickerBoard
options:
  bundleIdPrefix: com.tebasaki
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: ja
  knownRegions:
    - Base
    - ja
    - en

packages:
  FirebaseiOSSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  StickerBoard:
    type: application
    platform: iOS
    sources:
      - StickerBoard
      - Shared
      - path: Products.storekit
        optional: true
        buildPhase: none
    info:
      path: StickerBoard/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - stickerboard
            CFBundleURLName: com.tebasaki.StickerBoard
        NSLocalNetworkUsageDescription: "近くのデバイスとシールを交換するためにローカルネットワークへのアクセスが必要です"
        NSBonjourServices:
          - _stickerboard._tcp
          - _stickerboard._udp
        NSPhotoLibraryUsageDescription: "シールにする写真を選択するためにフォトライブラリへのアクセスが必要です"
        NSCameraUsageDescription: "シールにする写真を撮影するためにカメラへのアクセスが必要です"
        NSPhotoLibraryAddUsageDescription: "ボードを画像として写真に保存するためにフォトライブラリへのアクセスが必要です"
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: "public.app-category.lifestyle"
        CFBundleDisplayName: "シールボード -デジタルシール帳-"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        CURRENT_PROJECT_VERSION: "3"
        MARKETING_VERSION: "1.5.0"
        PRODUCT_BUNDLE_IDENTIFIER: "com.tebasaki.StickerBoard"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: StickerBoard/StickerBoard.entitlements
    dependencies:
      - target: StickerBoardWidgetExtension
        embed: true
      - package: FirebaseiOSSDK
        product: FirebaseCrashlytics
    postBuildScripts:
      - script: |
          if [ -f "${SRCROOT}/StickerBoard/GoogleService-Info.plist" ]; then
            "${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
          fi
        name: "[Firebase] Upload dSYMs to Crashlytics"
        inputFiles:
          - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${TARGET_NAME}"
          - "$(SRCROOT)/$(BUILT_PRODUCTS_DIR)/$(INFOPLIST_PATH)"

  StickerBoardWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - StickerBoardWidget
      - Shared
    info:
      path: StickerBoardWidget/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: "シールボード ウィジェット"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        CURRENT_PROJECT_VERSION: "3"
        MARKETING_VERSION: "1.5.0"
        PRODUCT_BUNDLE_IDENTIFIER: "com.tebasaki.StickerBoard.Widget"
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: StickerBoardWidget/StickerBoardWidget.entitlements
        TARGETED_DEVICE_FAMILY: "1"

  StickerBoardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - StickerBoardTests
    dependencies:
      - target: StickerBoard
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: "com.tebasaki.StickerBoardTests"

schemes:
  StickerBoard:
    build:
      targets:
        StickerBoard: all
        StickerBoardWidgetExtension: all
    run:
      config: Debug
      storeKitConfiguration: Products.storekit
    test:
      config: Debug
      targets:
        - StickerBoardTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
