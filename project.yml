name: StickerBoard
options:
  bundleIdPrefix: com.solodev
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_CFBundleDisplayName: "シールボード"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"

targets:
  StickerBoard:
    type: application
    platform: iOS
    sources:
      - StickerBoard
    settings:
      base:
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "シールにする写真を選択するためにフォトライブラリへのアクセスが必要です"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        PRODUCT_BUNDLE_IDENTIFIER: "com.solodev.StickerBoard"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
